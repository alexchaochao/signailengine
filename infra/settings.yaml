    enabled: false
    chain: solana
    chain_index: "501"
    measurement_token: BONK
    time_frame: "3"
    sort_by: "1"
    wallet_type: "3"
    registry_version: okx_registry_v1
    refresh_limit: 20
    raw_event_batch_size: 1000
    sync_interval_seconds: 300.0

