      max_snapshot_age_minutes: 20160
      required_keywords: [list, listing, roadmap, launch]
      excluded_keywords: [delist, removal, maintenance, suspend]
      venue: binance
      default_chain: unknown
      impact_score: 0.88
      credibility_score: 0.92
      extraction_mode: llm_with_heuristic_fallback
