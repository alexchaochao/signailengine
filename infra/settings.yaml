    # live 运行期控制：资金缓冲、kill switch、凭证来源、余额与定价 provider。
live:
  require_environment_separation: true
  rollout:
    global_kill_switch_enabled: false
    global_kill_switch_reason: ""
    capped_notional_usd: 100.0
    min_available_balance_usd: 500.0
    enforce_position_preflight: true
    enforce_balance_preflight: true

  # 凭证只能通过环境变量注入；yaml 中必须保持空值。
  credentials:
    chain_wallets: {}
    dex_providers: {}
    cex_providers: {}

  # live 余额来源；当前只配置了 solana / ethereum 默认映射。
  balance:
    native_asset_sources:
      solana:
        provider: solana_rpc
      ethereum:
        provider: evm_rpc

  # native asset 定价来源；执行 sizing 与余额估值会消费这里。
  pricing:
    timeout_seconds: 3.0
    max_retries: 1
    native_asset_sources:
      solana:
        provider: coingecko_simple_price
        asset: SOL
        quote_currency: USD
        lookup_key: solana
        url: https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd
      ethereum:
        provider: binance_ticker_price
        asset: ETH
        quote_currency: USD
        lookup_key: ETHUSDT
        url: https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT

  # 钱包情报同步任务的默认参数。
