# 应用基础信息与运行模式。
runtime:
  app_name: signalengine
  environment: local
  log_level: INFO

# Redis Streams 是主事件总线，raw-events/signals/decisions/executions 都从这里流转。
redis:
  url: redis://localhost:6379/0
  raw_events_stream: raw-events
  signals_stream: signals
  decisions_stream: decisions
  executions_stream: executions

# PostgreSQL 用于审计、状态、checkpoint、特征快照与发现候选缓存。
postgres:
  url: postgresql+psycopg://signalengine:signalengine@localhost:5432/signalengine
  echo: false
  pool_size: 5
  max_overflow: 10

# 观测与告警阈值。
observability:
  service_namespace: signalengine
  metrics_host: 0.0.0.0
  metrics_port: 9000
  max_event_lag_seconds: 30.0
  max_pipeline_latency_seconds: 5.0
  max_consecutive_adapter_failures: 3
  max_risk_rejections: 5

# 风控硬阈值；live_trading_enabled 只是总开关，真正 live 还受 .env 与 rollout 约束。
risk:
  max_token_exposure: 0.10
  max_chain_exposure: 0.40
  max_concurrent_positions: 5
  max_daily_loss: 0.03
  cooldown_minutes: 30
  min_liquidity_usd: 100000
  min_volume_5m_usd: 25000
  max_slippage_bps: 150
  live_trading_enabled: false

# replay 回归阈值，主要用于回放/回归对比，而非实时交易决策。
replay:
  regression_thresholds:
    fill_rate: 0.01
    rejection_rate: 0.01
    average_executed_notional_usd: 1.0
    route_count: 1.0
    risk_rejection_reason_count: 1.0
    strategy_executed_notional_usd: 1.0

# 特征工程窗口与 slippage 采样参数。
features:
  onchain:
    trade_windows: [1m, 5m, 15m]
    buy_pressure_primary_window: 5m
    min_trade_count_for_buy_pressure: 10
    max_trade_lag_seconds: 30.0
  slippage:
    quote_notional_usd: [1000.0, 5000.0, 10000.0]
    publication_notional_usd: 5000.0
    max_quote_age_seconds: 5.0
    allow_curve_fallback: true

# 对外通知：当前只给 Telegram 单 chat 推送首次进入 QUALIFIED 的 LAUNCH / MOMENTUM。
notifications:
  telegram:
    enabled: false
    bot_token:
    chat_id:
    publish_alpha_types: [LAUNCH, MOMENTUM]
    min_score: 0.0
    message_template_version: v1
    consumer_group: telegram-publisher
    consumer_name: telegram-publisher-1

# LLM enrichment for social analysis: disabled by default, heuristic fallback remains available.
llm:
  enabled: false
  provider: heuristic
  model: gpt-5.4
  api_key:
  base_url:
  timeout_seconds: 8.0
  temperature: 0.0
  max_evidence_texts: 6
  max_summary_chars: 280

# 生产采集链路配置：链上 trade / quote、launch / catalyst / flow measurement 都从这里开关与参数化。
acquisition:
  sync_interval_seconds: 5.0
  failure_backoff_seconds: 5.0
  source_cooldown_seconds: 60.0

  # 直接盯某个 Solana 地址或 owner 的交易流，适合钱包级 measurement 观察，不参与当前默认 discovery 主线。
  # `token` 在这里是 measurement 标签，不是 discovery watchlist；默认样例保持空值。
  solana_wallet_trade:
    enabled: false
    provider: solana_rpc_wallet_watch
    source_name: solana_rpc_wallet
    checkpoint_key: acquisition:solana_wallet_trades
    chain: solana
    source_kind: wallet
    signature_address:
    owner_address:
    wallet_address:
    token: ""
    token_mint:
    quote_asset: USDC
    quote_mint:
    quote_asset_usd_rate: 1.0
    pool_address: wallet-watch
    poll_limit: 20

  # 单一路由 Jupiter quote fallback；当前更推荐使用显式 measurement profile 或 jupiter_quote_routes。
  # `token` 仅用于给 quote measurement 打标签，默认样例保持空值。
  jupiter_quote:
    enabled: false
    provider: jupiter_quote_api
    source_name: jupiter_quote_api
    chain: solana
    token: ""
    input_mint:
    output_mint:
    input_decimals: 6
    output_decimals: 5
    quote_notional_usd: 5000.0
    slippage_bps: 100
    quote_url: https://lite-api.jup.ag/swap/v1/quote
    swap_url: https://lite-api.jup.ag/swap/v1/swap
    price_url: https://lite-api.jup.ag/price/v2

  # Solana measurement route -> Jupiter 路由表，live execution 与 quote 采样都优先走这里。
  jupiter_quote_routes: {}

  # 旧版单入口 EVM transfer watch，现仅保留为兼容入口；加载后会自动投影进统一 evm_routes registry。
  # `token` 只是 transfer measurement 标签，默认样例保持空值。
  evm_transfer_trade:
    enabled: false
    provider: evm_rpc_transfer_watch
    source_name: evm_rpc_transfer
    checkpoint_key: acquisition:evm_transfer_trades
    chain: base
    wallet_address:
    token: ""
    token_contract:
    quote_asset: USDC
    quote_contract:
    token_decimals: 18
    quote_decimals: 6
    quote_asset_usd_rate: 1.0
    pool_address: wallet-watch
    initial_lookback_blocks: 100

  # 多链 EVM 链级默认参数：新增链时优先在这里声明 chain_id / provider / quote API。
  evm_chains:
    base:
      chain_id: 8453
      provider: evm_quote_api
      api_provider: zeroex
      quote_api_url: https://api.0x.org/swap/permit2/price
      price_url: https://api.dexscreener.com/latest/dex/tokens
    ethereum:
      chain_id: 1
      provider: evm_rpc_pool_swap_watch
      api_provider: zeroex
      quote_api_url: https://api.0x.org/swap/permit2/price
      price_url: https://api.dexscreener.com/latest/dex/tokens
    arbitrum:
      chain_id: 42161
      provider: evm_rpc_transfer_watch
      api_provider: zeroex
      quote_api_url: https://api.0x.org/swap/permit2/price
      price_url: https://api.dexscreener.com/latest/dex/tokens

  # 多链 EVM route registry：只保留 measurement route 级字段；`token` 用于结果归属，不是 discovery 配置。
  evm_routes:
    base_quote:
      enabled: false
      source_type: quote
      source_name: evm_base_quote
      checkpoint_key: acquisition:evm_routes:base_quote
      chain: base
      token: ""
      token_contract:
      quote_asset: USDC
      quote_contract:
      token_decimals: 18
      quote_decimals: 6
      quote_notional_usd: 5000.0
      quote_slippage_bps: 100
    ethereum_pool:
      enabled: false
      source_type: pool_swap_trade
      source_name: evm_ethereum_pool
      checkpoint_key: acquisition:evm_routes:ethereum_pool
      chain: ethereum
      token: ""
      token_contract:
      quote_asset: USDC
      quote_contract:
      token_decimals: 18
      quote_decimals: 6
      quote_asset_usd_rate: 1.0
      pool_address:
      pool_protocol: uniswap_v3
      token_is_token0: true
      initial_lookback_blocks: 100
    arbitrum_transfer:
      enabled: false
      source_type: transfer_trade
      source_name: evm_arbitrum_transfer
      checkpoint_key: acquisition:evm_routes:arbitrum_transfer
      chain: arbitrum
      wallet_address:
      token: ""
      token_contract:
      quote_asset: USDC
      quote_contract:
      token_decimals: 18
      quote_decimals: 6
      quote_asset_usd_rate: 1.0
      pool_address: wallet-watch
      initial_lookback_blocks: 100

  # Launch Alpha：新池子/新对的发现链。
  launch_alpha_sources:
    # Solana 新池检测
    # ⚠ DexScreener Latest Profiles 容易被垃圾池污染，
    #    rug_filter 参数在代码层预留但 DexScreener 本身不提供这些字段。
    #   真正的 rug 防护需要额外数据源（如 RugCheck XYZ API 或 BPF 合约分析）。
    solana_new_pools:
      enabled: true
      provider: dexscreener_latest_profiles
      source_name: launch_alpha_solana
      chain: solana
      source_url: https://api.dexscreener.com/token-profiles/latest/v1
      fallback_source_urls: []
      pair_detail_url: https://api.dexscreener.com/latest/dex/tokens
      timeout_seconds: 5.0
      retry_attempts: 3
      retry_backoff_seconds: 0.5
      cache_ttl_seconds: 15.0
      min_request_interval_seconds: 0.25
      max_seed_records: 40
      max_snapshot_age_seconds: 120.0
      dex_allowlist: [raydium, orca]
      quote_asset_allowlist: [USDC, SOL]
      token_allowlist: []
      token_denylist: [USDT, USDC, SOL]
      min_initial_liquidity_usd: 18000.0
      min_buy_notional_5m_usd: 9000.0
      min_trade_count_5m: 12
      min_unique_wallets_5m: 8
      min_liquidity_lock_ratio: 0.85
      max_creator_hold_pct: 0.15
      # Rug filter（代码层已预留字段，DexScreener 本身不提供）
      min_deployer_age_days: 30
      require_honeypot_sim: true
      require_mint_revoked: true
      require_creator_lp_transfer: true
    # Base 新池检测
    base_new_pools:
      enabled: true
      provider: dexscreener_latest_profiles
      source_name: launch_alpha_base
      chain: base
      source_url: https://api.dexscreener.com/token-profiles/latest/v1
      fallback_source_urls: []
      pair_detail_url: https://api.dexscreener.com/latest/dex/tokens
      timeout_seconds: 5.0
      retry_attempts: 3
      retry_backoff_seconds: 0.5
      cache_ttl_seconds: 15.0
      min_request_interval_seconds: 0.25
      max_seed_records: 50
      max_snapshot_age_seconds: 120.0
      dex_allowlist: [uniswap_v3, aerodrome]
      quote_asset_allowlist: [USDC, WETH]
      token_allowlist: []
      token_denylist: [USDC, WETH]
      min_initial_liquidity_usd: 30000.0
      min_buy_notional_5m_usd: 15000.0
      min_trade_count_5m: 16
      min_unique_wallets_5m: 10
      min_liquidity_lock_ratio: 0.85
      max_creator_hold_pct: 0.15
      # Rug filter
      min_deployer_age_days: 30
      require_honeypot_sim: true
      require_mint_revoked: true
      require_creator_lp_transfer: true

  # Catalyst Alpha：交易所上币检测 — 生命周期信号。
